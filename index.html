 <script>
    // Redirect to portfolio.html after unlock completes
    (function() {
        var _origUnlock = window.unlockPortfolio;
        function patchUnlock() {
            var lockScreen = document.getElementById('lockScreen');
            if (!lockScreen) return;
            // Watch for lockScreen being hidden/removed as the unlock signal
            var observer = new MutationObserver(function(mutations) {
                mutations.forEach(function(mutation) {
                    if (mutation.type === 'attributes' && mutation.attributeName === 'class') {
                        if (lockScreen.classList.contains('unlocked') || lockScreen.style.display === 'none' || lockScreen.style.opacity === '0') {
                            setTimeout(function() {
                                window.location.href = 'portfolio.html';
                            }, 600);
                        }
                    }
                    if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
                        var opacity = parseFloat(lockScreen.style.opacity);
                        if (lockScreen.style.display === 'none' || opacity === 0) {
                            setTimeout(function() {
                                window.location.href = 'portfolio.html';
                            }, 600);
                        }
                    }
                });
            });
            observer.observe(lockScreen, { attributes: true, attributeFilter: ['class', 'style'] });
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', patchUnlock);
        } else {
            patchUnlock();
        }
    })();
 </script>
